services:
  postgres:
    image: postgres:16-alpine
    container_name: eventosvivos-postgres
    environment:
      POSTGRES_USER: eventos
      POSTGRES_PASSWORD: local
      POSTGRES_DB: eventosvivos
    ports:
      - "5432:5432"
    volumes:
      - eventosvivos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventos -d eventosvivos"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  eventosvivos_pgdata:
