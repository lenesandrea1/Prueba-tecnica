name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eventos
          POSTGRES_PASSWORD: local
          POSTGRES_DB: eventosvivos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eventos -d eventosvivos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=eventosvivos;Username=eventos;Password=local

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/eventos-vivos-web/package-lock.json

      - name: Build frontend
        working-directory: client/eventos-vivos-web
        run: |
          npm ci
          npm run build
